services:
  - type: web
    name: onramp-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install uv && uv sync --frozen
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.12"
